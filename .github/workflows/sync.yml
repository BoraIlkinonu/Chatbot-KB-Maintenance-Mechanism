name: KB Sync & Build Pipeline

on:
  schedule:
    # Midnight UAE (UTC+4) = 20:00 UTC
    - cron: '0 20 * * *'

  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force full pipeline rebuild'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      dry_run:
        description: 'Dry run (scan only, no downloads or stages)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-api-python-client
          pip install python-pptx python-docx openpyxl PyPDF2

      - name: Run Pipeline
        env:
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force_full }}" = "true" ]; then
            ARGS="--force-full"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python run_pipeline.py $ARGS

      - name: Run Extraction Verification
        if: github.event.inputs.dry_run != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python verify_extraction.py --save --github-summary

      - name: Reminder — Run dual-judge validation locally
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "============================================================"
          echo "  Dual-judge LLM validation is NOT run in CI."
          echo "  After downloading the generated KBs, run locally:"
          echo ""
          echo "    python validate_kb_judge.py --backend cli --verbose"
          echo ""
          echo "  See VALIDATE_KB.md for full instructions."
          echo "============================================================"

      - name: Upload KB outputs as artifact
        if: always() && github.event.inputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kb-outputs-${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: Commit output files
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "KB Pipeline Bot"
          git config user.email "kb-pipeline@endstar.ai"
          git add output/ logs/ state/ validation/ -f
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "KB Pipeline: Auto-sync $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30
