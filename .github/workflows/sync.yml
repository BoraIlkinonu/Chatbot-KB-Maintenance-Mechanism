name: KB Sync & Notify

on:
  schedule:
    # Midnight UAE (UTC+4) = 20:00 UTC
    - cron: '0 20 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (scan only, no state update)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      download:
        description: 'Download mode'
        required: false
        default: 'none'
        type: choice
        options:
          - 'none'
          - 'diff'
          - 'all'

permissions:
  contents: write

jobs:
  sync-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-api-python-client
          pip install python-pptx python-docx openpyxl pypdf

      - name: Run CI Pipeline (Sync + Notify)
        env:
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          DOWNLOAD="${{ github.event.inputs.download || 'none' }}"
          ARGS="--mode ci --download $DOWNLOAD"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--mode ci --dry-run"
          fi
          python run_pipeline.py $ARGS

      - name: Upload sources artifact
        if: >-
          always()
          && github.event.inputs.dry_run != 'true'
          && github.event.inputs.download != 'none'
          && github.event.inputs.download != ''
        uses: actions/upload-artifact@v4
        with:
          name: sources-${{ github.run_number }}
          path: |
            sources/
            state/
          retention-days: 30

      - name: Commit state files
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "KB Pipeline Bot"
          git config user.email "kb-pipeline@endstar.ai"
          git add state/ logs/ -f
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "KB Pipeline: Auto-sync $(date -u +%Y-%m-%d)"
            git stash --include-untracked
            git pull --rebase
            git stash pop || true
            git push
          fi

      - name: Notify Slack on cancellation
        if: cancelled()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\": \":no_entry_sign: *KB Pipeline Cancelled*\n\nRun #${{ github.run_number }} was manually cancelled before completion.\n\n<${RUN_URL}|View CI Run>\"}"
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30
